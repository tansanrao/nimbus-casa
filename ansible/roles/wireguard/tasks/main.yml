---
- name: Assert WireGuard role is valid
  ansible.builtin.assert:
    that:
      - wireguard_role in ['vps', 'connector']
      - wireguard_local_address is defined
      - wireguard_peer_allowed_ips is defined
      - "'10.10.' not in wireguard_peer_allowed_ips"
      - "'10.10.' not in wireguard_local_address"
    fail_msg: "WireGuard must use only point-to-point 10.200.0.0/24 addresses, never HOMELAB or wider home routes."

- name: Assert VPS WireGuard does not route home networks
  ansible.builtin.assert:
    that:
      - wireguard_local_address == "10.200.0.1/32"
      - wireguard_peer_allowed_ips == "10.200.0.2/32"
    fail_msg: "The VPS WireGuard peer must only allow the connector /32, never HOMELAB or wider home routes."
  when: wireguard_role == "vps"

- name: Assert connector WireGuard does not route home networks
  ansible.builtin.assert:
    that:
      - wireguard_local_address == "10.200.0.2/32"
      - wireguard_peer_allowed_ips == "10.200.0.1/32"
      - wireguard_peer_endpoint is defined
    fail_msg: "The connector WireGuard peer must only allow the VPS /32, never HOMELAB or wider home routes."
  when: wireguard_role == "connector"

- name: Assert WireGuard keys are populated
  ansible.builtin.assert:
    that:
      - wireguard_private_key is defined
      - wireguard_peer_public_key is defined
      - not wireguard_private_key.startswith('CHANGE_ME')
      - not wireguard_peer_public_key.startswith('CHANGE_ME')
    fail_msg: "Replace the encrypted WireGuard placeholders in ansible/group_vars/*.sops.yml before applying."

- name: Install WireGuard
  ansible.builtin.apt:
    name: wireguard
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Create WireGuard config directory
  ansible.builtin.file:
    path: "{{ wireguard_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Configure WireGuard interface
  ansible.builtin.template:
    src: wg0.conf.j2
    dest: "{{ wireguard_config_dir }}/{{ wireguard_interface }}.conf"
    owner: root
    group: root
    mode: "0600"
  notify: Restart WireGuard

- name: Enable WireGuard interface
  ansible.builtin.service:
    name: "wg-quick@{{ wireguard_interface }}"
    enabled: true
    state: started
