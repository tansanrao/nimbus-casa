---
version: '3'

set: [pipefail]
shopt: [globstar]

vars:
  ANSIBLE_DIR: '{{.ROOT_DIR}}/ansible'
  BOOTSTRAP_DIR: '{{.ROOT_DIR}}/bootstrap'
  OPENTOFU_PROXMOX_DIR: '{{.ROOT_DIR}}/opentofu/proxmox'
  KUBERNETES_DIR: '{{.ROOT_DIR}}/kubernetes'
  SCRIPTS_DIR: '{{.ROOT_DIR}}/scripts'
  TALOS_DIR: '{{.ROOT_DIR}}/talos'
  PRIVATE_DIR: '{{.ROOT_DIR}}/.private'
  TALOSCONFIG: '{{.ROOT_DIR}}/talos/clusterconfig/talosconfig'

env:
  KUBECONFIG: '{{.ROOT_DIR}}/kubeconfig'
  SOPS_AGE_KEY_FILE: '{{.ROOT_DIR}}/age.key'
  TALOSCONFIG: '{{.TALOSCONFIG}}'

includes:
  bootstrap: .taskfiles/bootstrap
  talos: .taskfiles/talos

tasks:

  default: task --list

  ansible:deps:
    desc: Install Ansible Galaxy dependencies
    cmd: cd {{.ANSIBLE_DIR}} && ansible-galaxy collection install -r requirements.yml -p .collections
    preconditions:
      - test -f {{.ANSIBLE_DIR}}/requirements.yml
      - which ansible-galaxy

  ansible:inventory:
    desc: Show Ansible inventory graph
    cmd: cd {{.ANSIBLE_DIR}} && ansible-inventory --graph
    deps: [ansible:deps]
    preconditions:
      - test -f {{.ANSIBLE_DIR}}/inventory.yml
      - which ansible-inventory

  ansible:syntax:
    desc: Run Ansible playbook syntax check
    cmd: cd {{.ANSIBLE_DIR}} && ansible-playbook --syntax-check site.yml
    deps: [ansible:deps]
    preconditions:
      - test -f {{.ANSIBLE_DIR}}/inventory.yml
      - test -f {{.ANSIBLE_DIR}}/site.yml
      - which ansible-playbook

  ansible:check:
    desc: Run Ansible check mode against infrastructure hosts
    cmd: cd {{.ANSIBLE_DIR}} && ansible-playbook --check --diff site.yml
    deps: [ansible:deps]
    preconditions:
      - test -f {{.ANSIBLE_DIR}}/inventory.yml
      - test -f {{.ANSIBLE_DIR}}/site.yml
      - which ansible-playbook

  ansible:apply:
    desc: Apply Ansible configuration to infrastructure hosts
    cmd: cd {{.ANSIBLE_DIR}} && ansible-playbook --diff site.yml
    deps: [ansible:deps]
    preconditions:
      - test -f {{.ANSIBLE_DIR}}/inventory.yml
      - test -f {{.ANSIBLE_DIR}}/site.yml
      - which ansible-playbook

  opentofu:fmt:
    desc: Format OpenTofu configuration
    cmd: tofu -chdir={{.OPENTOFU_PROXMOX_DIR}} fmt -recursive
    preconditions:
      - test -d {{.OPENTOFU_PROXMOX_DIR}}
      - which tofu

  opentofu:fmt-check:
    desc: Check OpenTofu formatting
    cmd: tofu -chdir={{.OPENTOFU_PROXMOX_DIR}} fmt -check -recursive
    preconditions:
      - test -d {{.OPENTOFU_PROXMOX_DIR}}
      - which tofu

  opentofu:init:
    desc: Initialize OpenTofu Proxmox configuration
    cmd: tofu -chdir={{.OPENTOFU_PROXMOX_DIR}} init
    preconditions:
      - test -d {{.OPENTOFU_PROXMOX_DIR}}
      - which tofu

  opentofu:validate:
    desc: Validate OpenTofu Proxmox configuration
    deps: [opentofu:init]
    cmd: tofu -chdir={{.OPENTOFU_PROXMOX_DIR}} validate
    preconditions:
      - test -d {{.OPENTOFU_PROXMOX_DIR}}
      - which tofu

  opentofu:plan:
    desc: Plan OpenTofu Proxmox changes
    deps: [opentofu:init]
    cmd: tofu -chdir={{.OPENTOFU_PROXMOX_DIR}} plan
    preconditions:
      - test -d {{.OPENTOFU_PROXMOX_DIR}}
      - which tofu

  opentofu:apply:
    desc: Apply OpenTofu Proxmox changes
    deps: [opentofu:init]
    cmd: tofu -chdir={{.OPENTOFU_PROXMOX_DIR}} apply
    preconditions:
      - test -d {{.OPENTOFU_PROXMOX_DIR}}
      - which tofu

  reconcile:
    desc: Force Flux to pull in changes from your Git repository
    cmd: flux --namespace flux-system reconcile kustomization flux-system --with-source
    preconditions:
      - test -f {{.KUBECONFIG}}
      - which flux
