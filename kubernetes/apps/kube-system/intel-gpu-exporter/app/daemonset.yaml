---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: intel-gpu-exporter
  labels:
    app.kubernetes.io/name: intel-gpu-exporter
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: intel-gpu-exporter
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: intel-gpu-exporter
    spec:
      hostPID: true
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      nodeSelector:
        intel.feature.node.kubernetes.io/gpu: "true"
        kubernetes.io/arch: amd64
      containers:
        - name: exporter
          image: ghcr.io/onedr0p/intel-gpu-exporter:rolling
          imagePullPolicy: IfNotPresent
          ports:
            - name: http-metrics
              containerPort: 8080
          securityContext:
            privileged: true
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              memory: 128Mi
              gpu.intel.com/monitoring: 1
          volumeMounts:
            - name: devfs
              mountPath: /dev/dri
      volumes:
        - name: devfs
          hostPath:
            path: /dev/dri
