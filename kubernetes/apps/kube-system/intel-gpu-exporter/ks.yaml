---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: intel-gpu-exporter
spec:
  dependsOn:
    - name: intel-gpu-plugin
      namespace: kube-system
  interval: 1h
  path: ./kubernetes/apps/kube-system/intel-gpu-exporter/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: kube-system
  wait: false
