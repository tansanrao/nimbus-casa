---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: democratic-csi-nfs-config
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: democratic-csi-nfs-config
    template:
      engineVersion: v2
      data:
        driver-config-file.yaml: |
          driver: zfs-generic-nfs
          instance_id: rocky-nfs
          sshConnection:
            host: "{{ .ROCKY_SSH_HOST }}"
            port: {{ .ROCKY_SSH_PORT }}
            username: "{{ .ROCKY_SSH_USER }}"
            privateKey: |-
          {{ .ROCKY_SSH_PRIVATE_KEY | trimSuffix "\n" | indent 14 }}
            hostPublicKey: "{{ .ROCKY_SSH_HOST_PUBLIC_KEY }}"
          zfs:
            cli:
              paths:
                zfs: /usr/sbin/zfs
                zpool: /usr/sbin/zpool
                sudo: /usr/bin/sudo
                chroot: /usr/sbin/chroot
              sudoEnabled: true
            datasetParentName: "{{ .ROCKY_NFS_DATASET_PARENT }}"
            detachedSnapshotsDatasetParentName: "{{ .ROCKY_NFS_SNAPSHOT_PARENT }}"
            datasetEnableQuotas: true
            datasetEnableReservation: false
            datasetPermissionsMode: "0777"
            datasetPermissionsUser: 0
            datasetPermissionsGroup: 0
          nfs:
            shareHost: "{{ .ROCKY_NFS_SHARE_HOST }}"
            shareStrategy: "setDatasetProperties"
            shareStrategySetDatasetProperties:
              properties:
                sharenfs: "rw=@{{ .ROCKY_NFS_ALLOWED_NETWORK }},no_subtree_check,no_root_squash"
  dataFrom:
    - extract:
        key: democratic-csi
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: democratic-csi-nvmeof-config
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: democratic-csi-nvmeof-config
    template:
      engineVersion: v2
      data:
        driver-config-file.yaml: |
          driver: zfs-generic-nvmeof
          instance_id: rocky-nvmeof
          sshConnection:
            host: "{{ .ROCKY_SSH_HOST }}"
            port: {{ .ROCKY_SSH_PORT }}
            username: "{{ .ROCKY_SSH_USER }}"
            privateKey: |-
          {{ .ROCKY_SSH_PRIVATE_KEY | trimSuffix "\n" | indent 14 }}
            hostPublicKey: "{{ .ROCKY_SSH_HOST_PUBLIC_KEY }}"
          zfs:
            cli:
              paths:
                zfs: /usr/sbin/zfs
                zpool: /usr/sbin/zpool
                sudo: /usr/bin/sudo
                chroot: /usr/sbin/chroot
              sudoEnabled: true
            datasetParentName: "{{ .ROCKY_NVME_DATASET_PARENT }}"
            detachedSnapshotsDatasetParentName: "{{ .ROCKY_NVME_SNAPSHOT_PARENT }}"
            zvolEnableReservation: false
          nvmeof:
            transports:
              - "{{ .ROCKY_NVME_TRANSPORT }}://{{ .ROCKY_NVME_SHARE_HOST }}:4420"
            namePrefix: "csi-"
            nameSuffix: "-k8s0"
            shareStrategy: "nvmetCli"
            shareStrategyNvmetCli:
              nvmetcliPath: /usr/sbin/nvmetcli
              configPath: /etc/nvmet/config.json
              configIsImportedFilePath: /etc/nvmet/config.json
              basename: "nqn.2003-01.org.linux-nvme"
              ports:
                - "{{ .ROCKY_NVME_PORT_ID }}"
              subsystem:
                attributes:
                  allow_any_host: 1
  dataFrom:
    - extract:
        key: democratic-csi
