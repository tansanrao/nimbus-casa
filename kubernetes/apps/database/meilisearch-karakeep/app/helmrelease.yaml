---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app meilisearch-karakeep
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: meilisearch-karakeep
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    defaultPodOptions:
      securityContext:
        runAsUser: 1001
        runAsGroup: 1001
        runAsNonRoot: true
        fsGroup: 1001
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      meilisearch-karakeep:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/getmeili/meilisearch
              tag: v1.40.0@sha256:54f0cca5442af756ff0254e3307cfd846605facf9b6989f571f6b1a96deb0c7c
            args:
              - /bin/meilisearch
              - --experimental-dumpless-upgrade
            env:
              MEILI_NO_ANALYTICS: "true"
              MEILI_MASTER_KEY:
                valueFrom:
                  secretKeyRef:
                    name: *app
                    key: MEILI_MASTER_KEY
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 4Gi
    service:
      app:
        controller: meilisearch-karakeep
        primary: true
        ports:
          http:
            port: 7700
    persistence:
      data:
        enabled: true
        existingClaim: meilisearch-karakeep
        advancedMounts:
          meilisearch-karakeep:
            app:
              - path: /meili_data
      tmp:
        type: emptyDir
        advancedMounts:
          meilisearch-karakeep:
            app:
              - path: /tmp
