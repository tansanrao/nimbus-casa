---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &app meilisearch-karakeep
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: *app
    template:
      engineVersion: v2
      data:
        MEILI_MASTER_KEY: "{{ .KARAKEEP_MEILISEARCH_MASTER_KEY }}"
  dataFrom:
    - extract:
        key: karakeep
