---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app meilisearch-karakeep
  namespace: &namespace database
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: openebs
      namespace: openebs-system
    - name: snapshot-controller
      namespace: kube-system
    - name: volsync
      namespace: volsync-system
    - name: onepassword
      namespace: external-secrets
  interval: 1h
  path: ./kubernetes/apps/database/meilisearch-karakeep/app
  postBuild:
    substitute:
      APP: meilisearch-karakeep
      VOLSYNC_CAPACITY: 10Gi
    substituteFrom:
      - kind: Secret
        name: cluster-secrets
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
  wait: false
