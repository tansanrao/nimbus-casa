---
clusterName: kubernetes

talosVersion: "${talosVersion}"
kubernetesVersion: "${kubernetesVersion}"

endpoint: https://10.10.40.40:6443
additionalApiServerCertSans: &sans
  - "127.0.0.1"
  - "10.10.40.40"
additionalMachineCertSans: *sans

clusterPodNets: ["10.42.0.0/16"]
clusterSvcNets: ["10.43.0.0/16"]

# Disable built-in CNI to use Cilium
cniConfig:
  name: none

nodes:
  - hostname: "k8s0"
    ipAddress: "10.10.40.40"
    installDisk: "/dev/sda"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/dc7b152cb3ea99b821fcb7340ce7168313ce393d663740b791c36f6e95fc8586
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "52:54:00:7f:f1:78"
        dhcp: false
        addresses:
          - "10.10.40.40/24"
        routes:
          - network: "0.0.0.0/0"
            gateway: "10.10.40.1"
        mtu: 1500


# Global patches
patches:
  - "@./patches/global/machine-kernel.yaml"
  - "@./patches/global/raw-volume-openebs-lvm.yaml"
  - "@./patches/global/machine-files.yaml"
  - "@./patches/global/machine-kubelet.yaml"
  - "@./patches/global/machine-network.yaml"
  - "@./patches/global/machine-sysctls.yaml"
  - "@./patches/global/machine-time.yaml"

# Controller patches
controlPlane:
  patches:
    - "@./patches/controller/cluster.yaml"
